spring:
    application:
        name: growtime
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/growtime}
        username: ${SPRING_DATASOURCE_USERNAME:postgres}
        password: ${SPRING_DATASOURCE_PASSWORD:qwer1234!!}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
            show-sql: true
            defer-datasource-initialization: true
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect
        database-platform: org.hibernate.dialect.PostgreSQLDialect
    jackson:
        property-naming-strategy: LOWER_CAMEL_CASE
        default-property-inclusion: NON_NULL
        serialization:
            write-dates-as-timestamps: false
        deserialization:
            fail-on-unknown-properties: false

server:
    port: ${PORT:8196}

github:
    clientId: ${GITHUB_CLIENT_ID:}
    clientSecret: ${GITHUB_CLIENT_SECRET:}

app:
    cors:
        allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
    level:
        com.board.growtime: DEBUG
        org.springframework.web: DEBUG
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE
        org.springframework.orm.jpa: DEBUG
