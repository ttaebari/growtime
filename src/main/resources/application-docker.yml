spring:
    application:
        name: growtime
    datasource:
        # Docker Compose 네트워크에서 postgres 서비스명으로 연결
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/postgres}
        username: ${SPRING_DATASOURCE_USERNAME:postgres}
        password: ${SPRING_DATASOURCE_PASSWORD:qwer1234!!}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update # Docker 환경에서는 update 사용
            show-sql: false # 프로덕션 환경에 맞게 로그 레벨 조정
        properties:
            hibernate:
                format_sql: false
                dialect: org.hibernate.dialect.PostgreSQLDialect
        database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
    port: ${PORT:8196}

github:
    clientId: ${GITHUB_CLIENT_ID:}
    clientSecret: ${GITHUB_CLIENT_SECRET:}

app:
    cors:
        allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://growtime-frontend-nine.vercel.app}
    jwt:
        secret: ${APP_JWT_SECRET}
        expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:86400}

logging:
    level:
        com.board.growtime: INFO
        org.springframework.web: WARN
        org.hibernate.SQL: WARN
        org.springframework.orm.jpa: WARN
    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Docker 환경 최적화
management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics
    endpoint:
        health:
            show-details: when-authorized
